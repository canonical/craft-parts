# Organize pattern common in snaps that ship a C library with its development
# kit alongside the runtime binaries.  Three separate glob rules move headers,
# shared libraries, and executables into the conventional FHS locations.
# This pattern is widespread across library-snaps on snapcraft.io, including
# those for openssl, sqlite, and zlib.
#
# A representative example can be found in the RabbitRemoteControl snap:
# Source: https://github.com/KangLin/RabbitRemoteControl/blob/5f32e02db0069508e467c217b5e9fca394e72991/snap/snapcraft.yaml

description: >
  Use multiple glob rules to reorganise headers, shared libraries, and
  executables from flat staging directories into FHS-compliant paths.
  This pattern is prevalent in library snaps that expose a development kit
  alongside the runtime components.

parts:
  my-lib:
    plugin: dump
    source: src
    organize:
      'include/*': usr/include/
      'lib/*': usr/lib/
      'bin/*': usr/bin/

setup_dirs:
  - src/include
  - src/lib
  - src/bin

setup_files:
  - src/include/mylib.h
  - src/include/mylib_extra.h
  - src/lib/libmylib.so.1
  - src/lib/libmylib.a
  - src/bin/mylib-config
  - src/bin/mylib-tool

expected_prime_present:
  - usr/include/mylib.h
  - usr/include/mylib_extra.h
  - usr/lib/libmylib.so.1
  - usr/lib/libmylib.a
  - usr/bin/mylib-config
  - usr/bin/mylib-tool

expected_prime_absent:
  - include/mylib.h
  - lib/libmylib.so.1
  - bin/mylib-config
