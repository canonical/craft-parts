# Organize pattern from the craft-parts documentation (Dump plugin how-to,
# section "To include a remote git repository with a specific branch").
# The upstream Plymouth theme repository places its files under a directory
# called 'ubuntu-core', but the snap expects the theme at the conventional
# /usr/share/plymouth/themes/ubuntu-core path, so organize renames the whole
# directory in one mapping.
#
# Source: https://github.com/canonical/craft-parts/blob/main/docs/common/craft-parts/how-to/include_files.rst
# Upstream theme repo: https://github.com/snapcore/plymouth-theme-ubuntu-core

description: >
  Rename a top-level directory to its final installation path by mapping the
  directory name on the left to the desired destination path on the right.
  This is the pattern used by Plymouth theme snaps where the upstream directory
  name differs from the conventional theme installation directory.

parts:
  plymouth-theme:
    plugin: dump
    source: src
    organize:
      ubuntu-core: usr/share/plymouth/themes/ubuntu-core

setup_dirs:
  - src/ubuntu-core

setup_files:
  - src/ubuntu-core/throbber-1.png
  - src/ubuntu-core/throbber-2.png
  - src/ubuntu-core/ubuntu-core.plymouth

expected_prime_present:
  - usr/share/plymouth/themes/ubuntu-core/throbber-1.png
  - usr/share/plymouth/themes/ubuntu-core/throbber-2.png
  - usr/share/plymouth/themes/ubuntu-core/ubuntu-core.plymouth

expected_prime_absent:
  - ubuntu-core/throbber-1.png
  - throbber-1.png
