name: Reproduce libapt ABI mismatch (Issue #1554)

# This workflow reproduces the ABI mismatch between the noble (Ubuntu 24.04)
# python-apt and Ubuntu 26.04's libapt-pkg.so.7.0.
#
# The noble python-apt was compiled against libapt-pkg.so.6.0. Running it on
# Ubuntu 26.04 (which ships libapt-pkg.so.7.0 / apt 3.x) causes either:
#   - An ImportError (libapt-pkg.so.6.0 not found), or
#   - An empty apt cache (binary cache format version mismatch),
# both leading to BuildPackageNotFound for valid packages.
#
# The matrix below runs the same steps on every Ubuntu release with noble
# (Ubuntu 24.04) python-apt. The expected outcome column shows which releases
# are affected by the bug:
#   - Ubuntu 24.04 (noble): test PASSES  – python-apt matches libapt-pkg SONAME
#   - Ubuntu 26.04 (resolute): test FAILS – libapt-pkg.so.7.0 vs .so.6.0 mismatch
#
# See: https://github.com/canonical/craft-parts/issues/1554

on:
  workflow_dispatch:
  pull_request:
    paths:
      - craft_parts/packages/apt_cache.py
      - tests/integration/packages/test_apt_abi_mismatch.py
      - .github/workflows/apt-abi-mismatch.yaml

permissions:
  contents: read

jobs:
  apt-abi-mismatch:
    name: ${{ matrix.ubuntu-version }} – noble python-apt
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - ubuntu-version: "24.04"
            lxd-image: ubuntu:24.04
            # Ubuntu 24.04 ships libapt-pkg.so.6.0: noble python-apt matches.
            expect-failure: false
          - ubuntu-version: "26.04"
            lxd-image: ubuntu:26.04
            # Ubuntu 26.04 ships libapt-pkg.so.7.0: noble python-apt mismatches.
            # The test failure here IS the bug being reproduced (Issue #1554).
            expect-failure: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up LXD
        run: |
          sudo snap install lxd --channel=latest/stable 2>/dev/null \
            || sudo snap refresh lxd --channel=latest/stable
          sudo lxd init --auto
          sudo chmod 666 /var/snap/lxd/common/lxd/unix.socket
          lxc version

      - name: Launch Ubuntu ${{ matrix.ubuntu-version }} LXD container
        run: |
          lxc launch ${{ matrix.lxd-image }} testenv --wait
          # Allow the container's network and services to start
          sleep 5

      - name: Copy source into container
        run: |
          lxc exec testenv -- mkdir -p /root/craft-parts
          tar -C . \
            --exclude='.git' \
            --exclude='.venv' \
            --exclude='__pycache__' \
            -czf - . \
          | lxc exec testenv -- tar -C /root/craft-parts -xzf -

      - name: Install uv in container
        run: |
          lxc exec testenv -- apt-get update -qq
          lxc exec testenv -- snap install --classic astral-uv

      - name: Install dependencies with noble python-apt
        run: |
          # Use the noble (Ubuntu 24.04) python-apt regardless of the container's
          # Ubuntu version. This simulates running a core24-based snap on the host.
          lxc exec testenv -- sh -c \
            "cd /root/craft-parts && uv sync --group dev --group dev-noble"

      - name: Run ABI mismatch test
        run: |
          # On Ubuntu 24.04 the test is expected to pass (no ABI mismatch).
          # On Ubuntu 26.04 the test is expected to fail, which IS the bug
          # being reproduced. If it unexpectedly passes, emit a warning so
          # that maintainers know the bug may have been fixed upstream.
          if lxc exec testenv -- sh -c \
              "cd /root/craft-parts && uv run pytest \
                tests/integration/packages/test_apt_abi_mismatch.py \
                -v --tb=short"; then
            if ${{ matrix.expect-failure }}; then
              echo "::warning::Issue #1554 may be resolved: noble python-apt" \
                "worked correctly on Ubuntu ${{ matrix.ubuntu-version }}." \
                "Update this workflow if the fix has landed."
            fi
          else
            if ! ${{ matrix.expect-failure }}; then
              echo "::error::Tests failed on Ubuntu ${{ matrix.ubuntu-version }}" \
                "where they were expected to pass."
              exit 1
            fi
            echo "::notice::Issue #1554 reproduced as expected: noble" \
              "python-apt failed on Ubuntu ${{ matrix.ubuntu-version }}" \
              "(ABI mismatch confirmed)."
          fi
