name: QA
on:
  push:
    branches:
      - "main"
      - "feature/*"
      - "hotfix/*"
      - "release/*"
      - "renovate/*"
  pull_request:
  merge_group:

# Cancel existing jobs for this branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  filter:
    runs-on: ubuntu-latest
    outputs:
      source-files: ${{ steps.filter.outputs.source-files }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          # Combine multiple negation checks into a union (¬A ∧ ¬B ∧ ¬C), because individual entries are checked independently (A ∨ B ∨ C).
          # If we ever need to filter only for docs, glob 'docs/**/*' and '**/*.md'
          filters: |
            source-files:
              - '!({docs/**,*.md,**/*.md,.readthedocs.yaml})'
  lint:
    uses: canonical/starflow/.github/workflows/lint-python.yaml@main
    needs: filter
    with:
      source-files: ${{ needs.filter.outputs.source-files }}
  test-common:
    uses: canonical/starflow/.github/workflows/test-python.yaml@main
    needs: filter
    with:
      source-files: ${{ needs.filter.outputs.source-files }}
      fast-test-platforms: >
        [
          "ubuntu-22.04",
          "ubuntu-22.04-arm",
          "ubuntu-24.04",
          "ubuntu-24.04-arm",
          ["noble", "s390x", "edge"],
          ["noble", "ppc64el", "edge"],
        ]
      fast-test-python-versions: '["3.10", "3.12", "3.13"]'
      slow-test-platforms: >
        [
          "ubuntu-22.04",
          "ubuntu-22.04-arm",
          "ubuntu-24.04",
          "ubuntu-24.04-arm",
          ["noble", "s390x", "edge"],
          ["noble", "ppc64el", "edge"],
        ]
      slow-test-python-versions: '["3.12"]'
      # We must always test on at least one EOL base to ensure that chisel behaves
      # correctly on said EOL base.
      lowest-python-platform: '["amd64", "focal"]'
      lowest-python-version: "3.10"
      pytest-markers: not java and not python and not plugin and not flaky
      setup-vars: NO_JAVA=1 NO_PYTHON=1 NO_PLUGIN=1
  test-flaky:
    uses: canonical/starflow/.github/workflows/test-python.yaml@main
    needs: filter
    with:
      source-files: ${{ needs.filter.outputs.source-files }}
      fast-test-platforms: "[]"
      slow-test-platforms: >
        [
          "ubuntu-22.04",
          "ubuntu-22.04-arm",
          "ubuntu-24.04",
          "ubuntu-24.04-arm",
        ]
      slow-test-python-versions: '["3.12"]'
      lowest-python-platform: '["amd64", "focal"]'
      lowest-python-version: "3.10"
      pytest-markers: flaky
      setup-vars: NO_JAVA=1 NO_PYTHON=1 NO_PLUGIN=1
  test-java-plugins:
    uses: canonical/starflow/.github/workflows/test-python.yaml@main
    needs: filter
    with:
      source-files: ${{ needs.filter.outputs.source-files }}
      fast-test-platforms: "[]"
      slow-test-platforms: >
        [
          "ubuntu-22.04",
          "ubuntu-22.04-arm",
          "ubuntu-24.04",
          "ubuntu-24.04-arm",
          ["noble", "s390x", "edge"],
          ["noble", "ppc64el", "edge"],
        ]
      slow-test-python-versions: '["3.12"]'
      lowest-python-version: ""
      pytest-markers: java
      setup-vars: NO_PYTHON=1 NO_PLUGIN=1
  test-python-plugins:
    uses: canonical/starflow/.github/workflows/test-python.yaml@main
    needs: filter
    with:
      source-files: ${{ needs.filter.outputs.source-files }}
      fast-test-platforms: "[]"
      slow-test-platforms: >
        [
          "ubuntu-24.04",
          "ubuntu-24.04-arm",
          ["noble", "s390x", "edge"],
          ["noble", "ppc64el", "edge"],
        ]
      slow-test-python-versions: '["3.12"]'
      lowest-python-version: ""
      pytest-markers: python
      setup-vars: NO_JAVA=1 NO_PLUGIN=1
  test-python-plugins-jammy:
    uses: canonical/starflow/.github/workflows/test-python.yaml@main
    needs: filter
    with:
      source-files: ${{ needs.filter.outputs.source-files }}
      fast-test-platforms: "[]"
      slow-test-platforms: >
        [
          "ubuntu-22.04",
          "ubuntu-22.04-arm",
        ]
      slow-test-python-versions: '["3.10"]'
      lowest-python-version: ""
      pytest-markers: python
      setup-vars: NO_JAVA=1 NO_PLUGIN=1
  test-other-plugins:
    uses: canonical/starflow/.github/workflows/test-python.yaml@main
    needs: filter
    with:
      source-files: ${{ needs.filter.outputs.source-files }}
      fast-test-platforms: "[]"
      slow-test-platforms: >
        [
          "ubuntu-22.04",
          "ubuntu-22.04-arm",
          "ubuntu-24.04",
          "ubuntu-24.04-arm",
          ["noble", "s390x", "edge"],
          ["noble", "ppc64el", "edge"],
        ]
      slow-test-python-versions: '["3.12"]'
      lowest-python-platform: '["focal"]'
      lowest-python-version: "3.10"
      pytest-markers: plugin
      setup-vars: NO_JAVA=1 NO_PYTHON=1

  test-requires-root:
    uses: canonical/starflow/.github/workflows/test-python.yaml@main
    needs: filter
    with:
      source-files: ${{ needs.filter.outputs.source-files }}
      fast-test-platforms: '["ubuntu-24.04"]'
      fast-test-python-versions: '["3.12"]'
      slow-test-platforms: '["ubuntu-24.04", "ubuntu-24.04-arm"]'
      slow-test-python-versions: '["3.12"]'
      lowest-python-version: ""
      pytest-markers: requires_root
      test-command-prefix: sudo env "PATH=$PATH"
